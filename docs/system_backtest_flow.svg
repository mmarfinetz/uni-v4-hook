<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Oracle-Anchored LVR Hook System And Backtest Flow</title>
  <desc id="desc">Current May 2026 flow from production hook paths through October sensitivity grid, observed-flow replay check, and report artifacts.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .section-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 12px Arial, sans-serif; fill: #334155; }
      .note { font: 12px Arial, sans-serif; fill: #475569; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; }
      .hook { fill: #eff6ff; stroke: #60a5fa; }
      .input { fill: #f0fdf4; stroke: #22c55e; }
      .grid { fill: #fff7ed; stroke: #fb923c; }
      .replay { fill: #faf5ff; stroke: #a855f7; }
      .report { fill: #fefce8; stroke: #eab308; }
      .line { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="#ffffff"/>
  <text x="40" y="48" class="title">Oracle-Anchored LVR Hook System And Backtest Flow</text>
  <text x="40" y="72" class="note">Current research bundle: production hook paths, October 2025 sensitivity grid, observed-flow replay check, and paper artifacts.</text>

  <rect x="35" y="100" width="1330" height="210" rx="10" class="panel"/>
  <text x="55" y="130" class="section-title">Production Hook Paths</text>

  <rect x="60" y="155" width="175" height="58" rx="7" class="hook"/>
  <text x="78" y="178" class="box-title">PoolManager swap</text>
  <text x="78" y="197" class="box-text">Uniswap v4 swap calls hook</text>

  <rect x="270" y="155" width="190" height="58" rx="7" class="hook"/>
  <text x="288" y="178" class="box-title">beforeSwap</text>
  <text x="288" y="197" class="box-text">load config and fresh oracle</text>

  <rect x="495" y="155" width="195" height="58" rx="7" class="hook"/>
  <text x="513" y="178" class="box-title">Risk and pool state</text>
  <text x="513" y="197" class="box-text">refresh EWMA, read slot0</text>

  <rect x="725" y="155" width="215" height="58" rx="7" class="hook"/>
  <text x="743" y="178" class="box-title">Quote informed-flow fee</text>
  <text x="743" y="197" class="box-text">base fee + sqrt LVR premium</text>

  <rect x="975" y="155" width="165" height="58" rx="7" class="hook"/>
  <text x="993" y="178" class="box-title">Safety checks</text>
  <text x="993" y="197" class="box-text">fresh oracle, maxFee cap</text>

  <rect x="1175" y="155" width="155" height="58" rx="7" class="hook"/>
  <text x="1193" y="178" class="box-title">Return or revert</text>
  <text x="1193" y="197" class="box-text">override LP fee or fail closed</text>

  <path d="M235 184 H270" class="line"/>
  <path d="M460 184 H495" class="line"/>
  <path d="M690 184 H725" class="line"/>
  <path d="M940 184 H975" class="line"/>
  <path d="M1140 184 H1175" class="line"/>

  <rect x="60" y="235" width="175" height="50" rx="7" class="hook"/>
  <text x="78" y="256" class="box-title">Add liquidity</text>
  <text x="78" y="275" class="box-text">LP range proposal</text>

  <rect x="270" y="235" width="190" height="50" rx="7" class="hook"/>
  <text x="288" y="256" class="box-title">beforeAddLiquidity</text>
  <text x="288" y="275" class="box-text">load reference tick</text>

  <rect x="495" y="235" width="220" height="50" rx="7" class="hook"/>
  <text x="513" y="256" class="box-title">Center and width guard</text>
  <text x="513" y="275" class="box-text">sigma2, latency, LVR budget</text>

  <rect x="750" y="235" width="190" height="50" rx="7" class="hook"/>
  <text x="768" y="256" class="box-title">Admission decision</text>
  <text x="768" y="275" class="box-text">accept centered/wide ranges</text>

  <path d="M235 260 H270" class="line"/>
  <path d="M460 260 H495" class="line"/>
  <path d="M715 260 H750" class="line"/>

  <rect x="35" y="340" width="390" height="250" rx="10" class="panel"/>
  <text x="55" y="370" class="section-title">Headline Grid Inputs</text>

  <rect x="60" y="395" width="330" height="58" rx="7" class="input"/>
  <text x="78" y="418" class="box-title">Resolved October 2025 windows</text>
  <text x="78" y="437" class="box-text">.tmp/month_2025_10/checkpointed_export_combined/windows</text>

  <rect x="60" y="475" width="330" height="76" rx="7" class="input"/>
  <text x="78" y="498" class="box-title">Per-window input bundle</text>
  <text x="78" y="517" class="box-text">pool snapshot, initialized ticks, liquidity events</text>
  <text x="78" y="535" class="box-text">swaps, oracle updates, market references</text>

  <path d="M225 453 V475" class="line"/>

  <rect x="465" y="340" width="500" height="250" rx="10" class="panel"/>
  <text x="485" y="370" class="section-title">October 2025 Sensitivity Grid</text>

  <rect x="490" y="395" width="210" height="58" rx="7" class="grid"/>
  <text x="508" y="418" class="box-title">run_oracle_gap_sensitivity_grid.py</text>
  <text x="508" y="437" class="box-text">four pools, 324 parameter sets each</text>

  <rect x="735" y="395" width="195" height="58" rx="7" class="grid"/>
  <text x="753" y="418" class="box-title">Baseline and state</text>
  <text x="753" y="437" class="box-text">observed blocks plus fixed-fee V3</text>

  <rect x="490" y="485" width="210" height="66" rx="7" class="grid"/>
  <text x="508" y="508" class="box-title">Correction trade</text>
  <text x="508" y="527" class="box-text">exact stale loss via correction_trade</text>

  <rect x="735" y="485" width="195" height="66" rx="7" class="grid"/>
  <text x="753" y="508" class="box-title">Auction simulation</text>
  <text x="753" y="527" class="box-text">stale-gap trigger, concession path, max fee</text>

  <path d="M700 424 H735" class="line"/>
  <path d="M833 453 V485" class="line"/>
  <path d="M735 518 H700" class="line"/>
  <path d="M425 465 H490" class="line"/>

  <rect x="1005" y="340" width="360" height="250" rx="10" class="panel"/>
  <text x="1025" y="370" class="section-title">Observed-Flow Replay Check</text>

  <rect x="1030" y="395" width="300" height="58" rx="7" class="replay"/>
  <text x="1048" y="418" class="box-title">run_dutch_auction_ablation_study.py</text>
  <text x="1048" y="437" class="box-text">supporting replay, not parameter selection</text>

  <rect x="1030" y="475" width="300" height="76" rx="7" class="replay"/>
  <text x="1048" y="498" class="box-title">Observed swap replay</text>
  <text x="1048" y="517" class="box-text">exact V3 replay, fee identity, fixed/hook/linear/log</text>
  <text x="1048" y="535" class="box-text">compares broad all-stale vs hook-based auction</text>

  <path d="M1180 453 V475" class="line"/>

  <rect x="35" y="625" width="1330" height="275" rx="10" class="panel"/>
  <text x="55" y="655" class="section-title">Report And Paper Artifacts</text>

  <rect x="60" y="685" width="220" height="68" rx="7" class="report"/>
  <text x="78" y="708" class="box-title">Grid outputs</text>
  <text x="78" y="727" class="box-text">sensitivity_grid_combined.csv</text>
  <text x="78" y="745" class="box-text">sensitivity_grid_windows.csv</text>

  <rect x="315" y="685" width="215" height="68" rx="7" class="report"/>
  <text x="333" y="708" class="box-title">Parameter audit trail</text>
  <text x="333" y="727" class="box-text">parameter_set_outcomes.md</text>
  <text x="333" y="745" class="box-text">policy_comparison.csv</text>

  <rect x="565" y="685" width="220" height="68" rx="7" class="report"/>
  <text x="583" y="708" class="box-title">Economic interpretation</text>
  <text x="583" y="727" class="box-text">sensitivity_impact_table.md</text>
  <text x="583" y="745" class="box-text">solver_economics_table.md</text>

  <rect x="820" y="685" width="220" height="68" rx="7" class="report"/>
  <text x="838" y="708" class="box-title">Publication charts</text>
  <text x="838" y="727" class="box-text">chart_a through chart_d</text>
  <text x="838" y="745" class="box-text">captions and chart audit log</text>

  <rect x="1075" y="685" width="220" height="68" rx="7" class="report"/>
  <text x="1093" y="708" class="box-title">Final draft</text>
  <text x="1093" y="727" class="box-text">checks pass deterministically</text>
  <text x="1093" y="745" class="box-text">lvr_v4_hook_paper_dutch_auction_v2.pdf</text>

  <path d="M835 551 V610 C835 625 170 610 170 685" class="line"/>
  <path d="M1180 551 V610 C1180 625 1185 625 1185 685" class="dash"/>
  <path d="M280 719 H315" class="line"/>
  <path d="M530 719 H565" class="line"/>
  <path d="M785 719 H820" class="line"/>
  <path d="M1040 719 H1075" class="line"/>

  <text x="60" y="820" class="note">Main parameter selection comes from the October grid: stale_gap_bps_before &gt;= trigger_gap_bps, fixed-fee V3 baseline, and per-pool clear-rate checks.</text>
  <text x="60" y="842" class="note">The observed-flow replay is supporting evidence for replay reliability and hook-based auction selectivity; it is not the source of the recommended parameter set.</text>
  <text x="60" y="864" class="note">The SVG is maintained as a static companion to docs/system_backtest_flow.md because Mermaid CLI is not part of the repo toolchain.</text>
</svg>
