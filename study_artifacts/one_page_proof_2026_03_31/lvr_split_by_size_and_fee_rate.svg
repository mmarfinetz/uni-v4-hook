  <title id="title">Who keeps stale-loss across swap sizes and fee rates?</title>
  <desc id="desc">LVR-weighted share of stale-loss recaptured by LPs versus left to arbitrageurs, across toxic swap-size bins and fixed fee schedules on real WETH/USDC replay data.</desc>
  <rect width="980" height="620" fill="#ffffff" />
  <text x="90" y="32" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Who keeps stale-loss on real toxic swaps?</text>
  <text x="90" y="54" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4b5563">Shares are LVR-weighted over exact-replay WETH/USDC swaps. Fixed-fee lines cap recapture at 100% of stale-loss; any overcharge beyond stale-loss is not counted here.</text>
